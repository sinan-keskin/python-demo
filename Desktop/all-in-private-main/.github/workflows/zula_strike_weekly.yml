name: Zula Strike Zendesk Report (Weekly)

on:
  schedule:
    - cron: "5 0 * * 1"   # Pazartesi 00:05 UTC = TR 03:05
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  run:
    runs-on: ubuntu-latest
    env:
      REPORT_TYPE: "WEEKLY"
      REPORT_TZ_OFFSET_HOURS: "3"
      ZULA_STRIKE_SHEET_ID: ${{ secrets.ZULA_STRIKE_SHEET_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.13"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread google-auth

      - name: Export env from APP_SECRETS (Zula Strike + Sheets)
        env:
          APP_SECRETS: ${{ secrets.APP_SECRETS }}
        run: |
          python - <<'PY'
          import os, json, sys
          raw = os.environ.get("APP_SECRETS")
          if not raw: sys.exit(0)
          j = json.loads(raw)
          z = j["zendesk"]["zula"]
          slack = (j.get("slack",{}).get("webhooks",{}) or {}).get("zula_strike","")
          creds = j.get("GOOGLE_SHEETS_CREDENTIALS", {})
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f'ZENDESK_SUBDOMAIN={z["subdomain"]}\n')
              f.write(f'ZENDESK_EMAIL_TOKEN={z["email_token"]}\n')
              f.write(f'ZENDESK_API_TOKEN={z["api_token"]}\n')
              if z.get("brand_strike_id"):
                  f.write(f'ZULA_BRAND_ID={z["brand_strike_id"]}\n')
              if slack:
                  f.write(f'SLACK_WEBHOOK_URL={slack}\n')
              if creds:
                  f.write(f'GOOGLE_CREDENTIALS_JSON={json.dumps(creds)}\n')
          PY

      - name: Run reporter (Zula Strike Weekly)
        env:
          PYTHONUNBUFFERED: "1"
        run: python -u -m zendesk_reports.reporter_zula_strike
