name: Wolfteam Zendesk Report (Monthly)

on:
  schedule:
    - cron: "10 0 1 * *"  # Ayın 1'i 00:10 UTC = TR 03:10
  workflow_dispatch:

concurrency:
  group: wolfteam-zendesk-reports
  cancel-in-progress: false
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  run:
    runs-on: ubuntu-latest
    env:
      REPORT_TYPE: "MONTHLY"
      REPORT_TZ_OFFSET_HOURS: "3"
      WOLFTEAM_BRAND_ID: "33471181389841"
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10.13"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread google-auth

      - name: Export env from APP_SECRETS (Wolfteam + Sheets)
        env:
          APP_SECRETS: ${{ secrets.APP_SECRETS }}
        run: |
          python - <<'PY'
          import os, json, sys
          raw = os.environ.get("APP_SECRETS")
          if not raw: sys.exit(0)
          j = json.loads(raw)
          wolf  = j["zendesk"]["wolfteam"]
          slack = (j.get("slack",{}).get("webhooks",{}) or {}).get("wolfteam","")
          creds = j.get("GOOGLE_SHEETS_CREDENTIALS", {})
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f'ZENDESK_SUBDOMAIN={wolf["subdomain"]}\n')
              f.write(f'ZENDESK_EMAIL_TOKEN={wolf["email_token"]}\n')
              f.write(f'ZENDESK_API_TOKEN={wolf["api_token"]}\n')
              if slack: f.write(f'SLACK_WEBHOOK_URL={slack}\n')
              if creds: f.write(f'GOOGLE_CREDENTIALS_JSON={json.dumps(creds)}\n')
          PY

      - name: Run reporter (Wolfteam Monthly)
        env:
          PYTHONUNBUFFERED: "1"
        run: python -u -m zendesk_reports.reporter_wolfteam
